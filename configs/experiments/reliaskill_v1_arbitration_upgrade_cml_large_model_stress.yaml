experiment_scale: reliaskill_v1_arbitration_upgrade_cml_large_model_stress
description: "CML stronger-GPU stress test for upgraded ReliaSkill: larger local models, strongest baselines, and learned-policy/contract ablations."
seed: 42
tools_path: data/raw_mcp/tools.jsonl
tasks_path: data/controls/test.jsonl
output_root: outputs/reliaskill_v1_arbitration_upgrade_cml_large_model_stress

generator:
  type: heuristic
  ablation_mode: base_only

runtime:
  strict_backends: true

models:
  - config: configs/models/llama_3_1_8b_instruct_4bit.yaml
    examples_per_second: 0.16
  - config: configs/models/gemma_2_9b_it_4bit.yaml
    examples_per_second: 0.16
  - config: configs/models/qwen2_5_14b_instruct_4bit.yaml
    examples_per_second: 0.08

conditions:
  - raw_mcp
  - raw_docs_full
  - generated_skill_base
  - skill_prompt_verbose_docs
  - reliaskill_v1_no_learned_router_policy
  - reliaskill_v1_with_global_router_prior
  - reliaskill_v1_no_hard_negative_policy
  - reliaskill_v1_no_contract_arbitration
  - reliaskill_v1

data:
  config: configs/data/emnlp_scale.yaml
  max_tools: 100
  min_domains_required: 10

controls:
  config: configs/controls/emnlp_scale.yaml
  positives_per_tool_total: 3
  negatives_per_tool_total: 2

routing:
  config: configs/routing/distractor_inventory.yaml
  candidate_set_sizes: [4]

live_execution:
  enabled: false

shared_skill_packages:
  root: outputs/reliaskill_v1_arbitration_upgrade_cml_large_model_stress/shared_packages
  dev_controls_path: data/controls/dev.jsonl
  reliability_predictor:
    type: heuristic
  max_repair_rounds: 2
  deploy_threshold: 85.0

skills:
  multi_candidate_config: configs/skills/multi_candidate.yaml
  candidate_k: 3
  compactness_config: configs/skills/compactness_variants.yaml

repair:
  config: configs/repair/repair_strategies.yaml

scheduler:
  one_gpu: true
  resume: true
  group_by_model: true
  run_all_conditions_before_unload: true
  max_batch_size: 8
  prompt_safety_margin_tokens: 256
  include_routing: true
  examples_per_second: 0.12
  estimated_bytes_per_call: 5120
  estimated_bytes_per_token: 1.5
  condition_token_overheads:
    raw_mcp: 900
    raw_docs_full: 1600
    generated_skill_base: 300
    skill_prompt_verbose_docs: 1200
    reliaskill_v1_no_learned_router_policy: 575
    reliaskill_v1_with_global_router_prior: 575
    reliaskill_v1_no_hard_negative_policy: 575
    reliaskill_v1_no_contract_arbitration: 575
    reliaskill_v1: 575
