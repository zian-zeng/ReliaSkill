experiment_scale: paper_gemma2_9b_fast
description: Fast Gemma-2-9B-IT run with only the 5 most critical conditions.
seed: 42
tools_path: data/raw_mcp/tools.jsonl
tasks_path: data/controls/test.jsonl
output_root: outputs/gemma2_9b_fast_results

generator:
  type: heuristic
  package_root: outputs/medium_overnight/packages

predictor:
  type: local_hf
  model_name_or_path: google/gemma-2-9b-it
  load_in_4bit: true
  device_map: auto

models:
  - configs/models/gemma_2_9b_it_4bit.yaml

# Only running the 5 most important conditions for the paper to save time on 9B
conditions:
  - raw_mcp                           # Baseline 1: No docs
  - autoskill_base                    # Baseline 2: AutoSkill standard
  - human_written_skill_upper_bound   # Upper Bound
  - skill_prompt_boundary_first       # Our Best for Execution
  - skill_prompt_verbose_docs         # Our Best for Routing

data:
  config: configs/data/emnlp_scale.yaml
  max_tools: 280
controls:
  config: configs/controls/emnlp_scale.yaml
  positives_per_tool_total: 3
  negatives_per_tool_total: 2
routing:
  config: configs/routing/distractor_inventory.yaml
  candidate_set_sizes: [4]

scheduler:
  one_gpu: true
  resume: true
  group_by_model: true
  run_all_conditions_before_unload: true
  max_batch_size: 16
  prompt_safety_margin_tokens: 256
  include_routing: true
