experiment_scale: reliaskill_v1_fidelity_ablation_smoke
description: "Component smoke test for the fidelity-aware ReliaSkill cascade: isolates risk-adaptive prompting, prompt cascade, and explicit argument-fidelity selection on Phi 3.5 mini and Qwen 2.5 7B."
seed: 42
tools_path: data/raw_mcp/tools.jsonl
tasks_path: data/controls/test.jsonl
output_root: outputs/reliaskill_v1_fidelity_ablation_smoke

generator:
  type: heuristic
  ablation_mode: base_only

runtime:
  strict_backends: true

models:
  - config: configs/models/phi_3_5_mini_instruct_4bit.yaml
    examples_per_second: 0.35
  - config: configs/models/qwen2_5_7b_instruct_4bit.yaml
    examples_per_second: 0.20

conditions:
  - raw_mcp
  - raw_docs_full
  - generated_skill_base
  - skill_prompt_verbose_docs
  - reliaskill_v1_no_risk_adaptive_prompt_policy
  - reliaskill_v1_no_prompt_cascade
  - reliaskill_v1_no_explicit_argument_fidelity
  - reliaskill_v1_compact_prompt_only
  - reliaskill_v1_full_proof_prompt_only
  - reliaskill_v1_no_global_router_prior
  - reliaskill_v1

data:
  config: configs/data/emnlp_scale.yaml
  max_tools: 20
  min_domains_required: 6

controls:
  config: configs/controls/emnlp_scale.yaml
  positives_per_tool_total: 3
  negatives_per_tool_total: 2

routing:
  config: configs/routing/distractor_inventory.yaml
  candidate_set_sizes: [4]

live_execution:
  enabled: false

shared_skill_packages:
  root: outputs/reliaskill_v1_fidelity_ablation_smoke/shared_packages
  dev_controls_path: data/controls/dev.jsonl
  reliability_predictor:
    type: heuristic
  max_repair_rounds: 2
  deploy_threshold: 85.0

skills:
  multi_candidate_config: configs/skills/multi_candidate.yaml
  candidate_k: 3
  compactness_config: configs/skills/compactness_variants.yaml

repair:
  config: configs/repair/repair_strategies.yaml

scheduler:
  one_gpu: true
  resume: true
  group_by_model: true
  run_all_conditions_before_unload: true
  max_batch_size: 8
  prompt_safety_margin_tokens: 256
  include_routing: true
  examples_per_second: 0.25
  estimated_bytes_per_call: 5120
  estimated_bytes_per_token: 1.5
  condition_token_overheads:
    raw_mcp: 900
    raw_docs_full: 1600
    generated_skill_base: 300
    skill_prompt_verbose_docs: 1200
    reliaskill_v1_no_risk_adaptive_prompt_policy: 575
    reliaskill_v1_no_prompt_cascade: 575
    reliaskill_v1_no_explicit_argument_fidelity: 575
    reliaskill_v1_compact_prompt_only: 300
    reliaskill_v1_full_proof_prompt_only: 575
    reliaskill_v1_no_global_router_prior: 575
    reliaskill_v1: 575
